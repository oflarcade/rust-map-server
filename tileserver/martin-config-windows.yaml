# Martin configuration for Windows - port 3001
# Run from project root: martin --config tileserver\martin-config-windows.yaml
# Or use: .\scripts\run-martin.ps1

listen_addresses: '0.0.0.0:3001'
worker_processes: 4
keep_alive: 75

pmtiles:
  # Each path is scanned for *.pmtiles at that directory level (not recursive).
  # Add pmtiles/full etc. only if that folder exists (see scripts/sh/flatten-pmtiles-for-martin.sh).
  paths:
    - pmtiles
    - boundaries
    - pmtiles/z6
