# Docker Compose for local tenant-based tile serving
# Martin (tiles) + Nginx (tenant routing via X-Tenant-ID header)
#
# Usage:
#   docker compose -f tileserver/docker-compose.tenant.yml up
#
# Endpoints:
#   http://localhost:8080/tiles/{z}/{x}/{y}       (X-Tenant-ID header required)
#   http://localhost:8080/boundaries/{z}/{x}/{y}   (X-Tenant-ID header required)
#   http://localhost:8080/health
#   http://localhost:3000/catalog                   (Martin direct)

services:
  martin:
    image: ghcr.io/maplibre/martin:v0.14.2
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ../pmtiles:/data/pmtiles:ro
      - ../boundaries:/data/boundaries:ro
      - ./martin-config.yaml:/config/martin-config.yaml:ro
    command: --config /config/martin-config.yaml

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./nginx-tenant-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - martin
