# Nginx Tenant-Based Tile Proxy Configuration
# Routes tile requests based on X-Tenant-ID header to appropriate Martin sources
#
# Architecture:
#   Client → Nginx (port 8080) → Martin (port 3000)
#   Routing: X-Tenant-ID header → Martin source name
#
# Security: Only X-Tenant-ID header routing supported (no URL-based tenant IDs)

# Logging configuration for observability
log_format tenant_access '$remote_addr - $remote_user [$time_local] '
                         '"$request" $status $body_bytes_sent '
                         '"$http_referer" "$http_user_agent" '
                         'tenant_id=$http_x_tenant_id source=$tenant_source '
                         'request_time=$request_time upstream_time=$upstream_response_time';

# Map X-Tenant-ID header to Martin tile source names
# Based on tenant-config.json mapping
map $http_x_tenant_id $tenant_source {
    default "";

    # Bridge Kenya (tenantId: 1)
    "1"  "kenya-detailed";

    # Bridge Uganda (tenantId: 2)
    "2"  "uganda-detailed";

    # Bridge Nigeria - Lagos + Osun (tenantId: 3)
    "3"  "nigeria-lagos-osun";

    # Bridge Liberia (tenantId: 4)
    "4"  "liberia-detailed";

    # Bridge India - Andhra Pradesh (tenantId: 5)
    "5"  "india-andhrapradesh";

    # EdoBEST - Edo State (tenantId: 9)
    "9"  "nigeria-edo";

    # EKOEXCEL - Lagos State (tenantId: 11)
    "11" "nigeria-lagos";

    # Rwanda EQUIP (tenantId: 12)
    "12" "rwanda-detailed";

    # Kwara Learn (tenantId: 14)
    "14" "nigeria-kwara";

    # Manipur Education (tenantId: 15)
    "15" "india-manipur";

    # Bayelsa Prime (tenantId: 16)
    "16" "nigeria-bayelsa";

    # Espoir CAR (tenantId: 17)
    "17" "central-african-republic-detailed";

    # Jigawa Unite (tenantId: 18)
    "18" "nigeria-jigawa";
}

# Map tenant source to boundary source name
# Pattern: {source} → {source}-boundaries (per-tenant boundary pmtiles)
map $tenant_source $boundary_source {
    default "";

    # Country-level boundaries
    "kenya-detailed"                      "kenya-boundaries";
    "uganda-detailed"                     "uganda-boundaries";
    "liberia-detailed"                    "liberia-boundaries";
    "rwanda-detailed"                     "rwanda-boundaries";
    "central-african-republic-detailed"   "central-african-republic-boundaries";

    # Indian state boundaries
    "india-andhrapradesh"                 "india-boundaries";
    "india-manipur"                       "india-boundaries";

    # Nigerian state boundaries - per-tenant (only that state + its LGAs)
    "nigeria-edo"                "nigeria-edo-boundaries";
    "nigeria-lagos"              "nigeria-lagos-boundaries";
    "nigeria-bayelsa"            "nigeria-bayelsa-boundaries";
    "nigeria-jigawa"             "nigeria-jigawa-boundaries";
    "nigeria-kwara"              "nigeria-kwara-boundaries";
    "nigeria-lagos-osun"         "nigeria-lagos-osun-boundaries";
}

upstream martin {
    # Martin tile server backend
    server martin:3000;

    # Connection pooling for performance
    keepalive 32;
    keepalive_requests 1000;
    keepalive_timeout 60s;
}

server {
    listen 8080;
    server_name _;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Observability: Custom access log with tenant tracking
    access_log /var/log/nginx/access.log tenant_access;
    error_log /var/log/nginx/error.log warn;

    # Health check endpoint for load balancers/monitoring
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # Martin catalog endpoint (passthrough)
    location /catalog {
        proxy_pass http://martin;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
    }

    # TileJSON for base tiles: /tiles.json
    # Returns bounds, center, zoom range per tenant
    location = /tiles.json {
        if ($http_x_tenant_id = "") {
            return 400 '{"error": "X-Tenant-ID header is required", "code": "MISSING_TENANT_ID"}\n';
        }
        if ($tenant_source = "") {
            return 400 '{"error": "Invalid tenant ID", "code": "INVALID_TENANT_ID", "tenant_id": "$http_x_tenant_id"}\n';
        }

        rewrite ^ /$tenant_source break;
        proxy_pass http://martin;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=3600" always;
    }

    # TileJSON for boundary tiles: /boundaries.json
    # Returns bounds, center, zoom range for boundary data
    location = /boundaries.json {
        if ($http_x_tenant_id = "") {
            return 400 '{"error": "X-Tenant-ID header is required", "code": "MISSING_TENANT_ID"}\n';
        }
        if ($tenant_source = "") {
            return 400 '{"error": "Invalid tenant ID", "code": "INVALID_TENANT_ID", "tenant_id": "$http_x_tenant_id"}\n';
        }
        if ($boundary_source = "") {
            return 404 '{"error": "No boundary data available for this tenant", "code": "NO_BOUNDARY_DATA", "tenant_id": "$http_x_tenant_id"}\n';
        }

        rewrite ^ /$boundary_source break;
        proxy_pass http://martin;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=3600" always;
    }

    # Tile requests: /tiles/{z}/{x}/{y}
    # Requires X-Tenant-ID header
    location ~ ^/tiles/(?<zoom>\d+)/(?<x>\d+)/(?<y>\d+)$ {
        # Validate X-Tenant-ID header presence
        if ($http_x_tenant_id = "") {
            return 400 '{"error": "X-Tenant-ID header is required", "code": "MISSING_TENANT_ID"}\n';
        }

        # Validate tenant mapping exists
        if ($tenant_source = "") {
            return 400 '{"error": "Invalid tenant ID", "code": "INVALID_TENANT_ID", "tenant_id": "$http_x_tenant_id"}\n';
        }

        # Rewrite to Martin source URL: /{source}/{z}/{x}/{y}
        rewrite ^/tiles/(.*)$ /$tenant_source/$1 break;

        # Proxy to Martin with connection reuse
        proxy_pass http://martin;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;

        # Caching headers for tile responses
        proxy_cache_bypass $http_pragma $http_authorization;
        add_header X-Tenant-Source $tenant_source always;
        add_header Cache-Control "public, max-age=3600" always;

        # Timeouts (tiles should be fast)
        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;

        # Error handling
        proxy_intercept_errors on;
        error_page 404 = @tile_not_found;
        error_page 502 503 504 = @tile_upstream_error;
    }

    # Boundary requests: /boundaries/{z}/{x}/{y}
    # Requires X-Tenant-ID header
    location ~ ^/boundaries/(?<zoom>\d+)/(?<x>\d+)/(?<y>\d+)$ {
        # Validate X-Tenant-ID header presence
        if ($http_x_tenant_id = "") {
            return 400 '{"error": "X-Tenant-ID header is required", "code": "MISSING_TENANT_ID"}\n';
        }

        # Validate tenant mapping exists
        if ($tenant_source = "") {
            return 400 '{"error": "Invalid tenant ID", "code": "INVALID_TENANT_ID", "tenant_id": "$http_x_tenant_id"}\n';
        }

        # Validate boundary source exists
        if ($boundary_source = "") {
            return 404 '{"error": "No boundary data available for this tenant", "code": "NO_BOUNDARY_DATA", "tenant_id": "$http_x_tenant_id"}\n';
        }

        # Rewrite to Martin boundary source URL: /{source}-boundaries/{z}/{x}/{y}
        rewrite ^/boundaries/(.*)$ /$boundary_source/$1 break;

        # Proxy to Martin
        proxy_pass http://martin;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;

        # Caching headers
        proxy_cache_bypass $http_pragma $http_authorization;
        add_header X-Tenant-Source $tenant_source always;
        add_header X-Boundary-Source $boundary_source always;
        add_header Cache-Control "public, max-age=7200" always;

        # Timeouts
        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;

        # Error handling
        proxy_intercept_errors on;
        error_page 404 = @boundary_not_found;
        error_page 502 503 504 = @boundary_upstream_error;
    }

    # Error handlers for better client feedback
    location @tile_not_found {
        add_header Content-Type application/json always;
        return 404 '{"error": "Tile not found", "code": "TILE_NOT_FOUND", "tenant_id": "$http_x_tenant_id", "source": "$tenant_source"}\n';
    }

    location @boundary_not_found {
        add_header Content-Type application/json always;
        return 404 '{"error": "Boundary tile not found", "code": "BOUNDARY_NOT_FOUND", "tenant_id": "$http_x_tenant_id", "source": "$boundary_source"}\n';
    }

    location @tile_upstream_error {
        add_header Content-Type application/json always;
        return 502 '{"error": "Tile server unavailable", "code": "UPSTREAM_ERROR"}\n';
    }

    location @boundary_upstream_error {
        add_header Content-Type application/json always;
        return 502 '{"error": "Boundary server unavailable", "code": "UPSTREAM_ERROR"}\n';
    }

    # Default: reject all other requests
    location / {
        add_header Content-Type application/json always;
        return 404 '{"error": "Not found", "code": "INVALID_ENDPOINT", "hint": "Use /tiles/{z}/{x}/{y} or /boundaries/{z}/{x}/{y} with X-Tenant-ID header"}\n';
    }
}
