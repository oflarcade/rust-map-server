lua_package_path "/etc/nginx/lua/?.lua;/etc/nginx/lua/?/init.lua;;";
lua_shared_dict region_cache    16m;
lua_shared_dict hierarchy_cache  8m;
lua_shared_dict tenant_cache     1m;

gzip on;
gzip_types application/json application/geo+json application/x-protobuf;
gzip_min_length 1024;
gzip_comp_level 6;

log_format tenant_access '$remote_addr - $remote_user [$time_local] '
                         '"$request" $status $body_bytes_sent '
                         '"$http_referer" "$http_user_agent" '
                         'tenant_id=$http_x_tenant_id source=$tenant_source '
                         'request_time=$request_time upstream_time=$upstream_response_time';

# ---------------------------------------------------------------------------
# Tile source routing — kept as static map for Martin proxy (fast, no DB lookup)
# ---------------------------------------------------------------------------
map $http_x_tenant_id $tenant_source {
    default "";
    "1"  "kenya-detailed";
    "2"  "uganda-detailed";
    "3"  "nigeria-lagos-osun";
    "4"  "liberia-detailed";
    "5"  "india-andhrapradesh";
    "9"  "nigeria-edo";
    "11" "nigeria-lagos";
    "12" "rwanda-detailed";
    "14" "nigeria-kwara";
    "15" "india-manipur";
    "16" "nigeria-bayelsa";
    "17" "central-african-republic-detailed";
    "18" "nigeria-jigawa";
}

map $tenant_source $boundary_source {
    default "";
    "kenya-detailed"                    "kenya-boundaries";
    "uganda-detailed"                   "uganda-boundaries";
    "liberia-detailed"                  "liberia-boundaries";
    "rwanda-detailed"                   "rwanda-boundaries";
    "central-african-republic-detailed" "central-african-republic-boundaries";
    "india-andhrapradesh"               "india-boundaries";
    "india-manipur"                     "india-boundaries";
    "nigeria-edo"                       "nigeria-edo-boundaries";
    "nigeria-lagos"                     "nigeria-lagos-boundaries";
    "nigeria-bayelsa"                   "nigeria-bayelsa-boundaries";
    "nigeria-jigawa"                    "nigeria-jigawa-boundaries";
    "nigeria-kwara"                     "nigeria-kwara-boundaries";
    "nigeria-lagos-osun"                "nigeria-lagos-osun-boundaries";
}

upstream martin {
    server martin:3000;
    keepalive 32;
    keepalive_requests 1000;
    keepalive_timeout 60s;
}

server {
    listen 8080;
    server_name _;

    resolver 127.0.0.11 ipv6=off;  # Docker internal DNS for cosocket pgmoon

    # Dynamic tenant routing: if nginx map didn't resolve the tenant (new tenant added to DB),
    # fall back to DB lookup cached in ngx.shared.tenant_cache (300s TTL).
    # OpenResty allows overriding map-computed variables via ngx.var for the current request.
    rewrite_by_lua_block {
        if ngx.var.tenant_source == "" then
            local tid_str = ngx.var.http_x_tenant_id
            if tid_str and tid_str ~= "" then
                local ok, router = pcall(require, "tenant-router")
                if ok and router then
                    local cfg = router.get(tonumber(tid_str))
                    if cfg and cfg.tile_source and cfg.tile_source ~= "" then
                        ngx.var.tenant_source   = cfg.tile_source
                        ngx.var.boundary_source = cfg.boundary_source or ""
                    end
                end
            end
        end
    }

    # Inject CORS headers into every response that has an Origin header.
    # header_filter_by_lua runs after the response status is set (including
    # responses from nginx `return` directives), so OPTIONS 204 gets headers too.
    header_filter_by_lua_block {
        local origin = ngx.req.get_headers()["Origin"]
        if origin then
            ngx.header["Access-Control-Allow-Origin"]  = origin
            ngx.header["Access-Control-Allow-Methods"] = "GET, POST, PUT, DELETE, OPTIONS"
            ngx.header["Access-Control-Allow-Headers"] = "X-Tenant-ID, Content-Type"
            ngx.header["Access-Control-Max-Age"]       = "86400"
            ngx.header["Vary"] = "Origin"
        end
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    access_log /dev/stdout tenant_access;
    error_log  /dev/stderr warn;

    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    location /catalog {
        proxy_pass http://martin;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
    }

    location = /tiles.json {
        if ($http_x_tenant_id = "") {
            return 400 '{"error":"X-Tenant-ID header is required","code":"MISSING_TENANT_ID"}\n';
        }
        if ($tenant_source = "") {
            return 400 '{"error":"Invalid tenant ID","code":"INVALID_TENANT_ID","tenant_id":"$http_x_tenant_id"}\n';
        }
        rewrite ^ /$tenant_source break;
        proxy_pass http://martin;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=3600" always;
    }

    location = /boundaries.json {
        if ($http_x_tenant_id = "") {
            return 400 '{"error":"X-Tenant-ID header is required","code":"MISSING_TENANT_ID"}\n';
        }
        if ($tenant_source = "") {
            return 400 '{"error":"Invalid tenant ID","code":"INVALID_TENANT_ID","tenant_id":"$http_x_tenant_id"}\n';
        }
        if ($boundary_source = "") {
            return 404 '{"error":"No boundary data for this tenant","code":"NO_BOUNDARY_DATA","tenant_id":"$http_x_tenant_id"}\n';
        }
        rewrite ^ /$boundary_source break;
        proxy_pass http://martin;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=3600" always;
    }

    location = /boundaries/geojson {
        if ($request_method = OPTIONS) { return 204; }
        access_by_lua_file /etc/nginx/lua/origin-whitelist.lua;

        if ($http_x_tenant_id = "") {
            return 400 '{"error":"X-Tenant-ID header is required","code":"MISSING_TENANT_ID"}\n';
        }
        if ($tenant_source = "") {
            return 400 '{"error":"Invalid tenant ID","code":"INVALID_TENANT_ID","tenant_id":"$http_x_tenant_id"}\n';
        }

        content_by_lua_file /etc/nginx/lua/serve-geojson.lua;
    }

    location = /boundaries/hierarchy {
        if ($request_method = OPTIONS) { return 204; }
        access_by_lua_file /etc/nginx/lua/origin-whitelist.lua;

        if ($http_x_tenant_id = "") {
            return 400 '{"error":"X-Tenant-ID header is required","code":"MISSING_TENANT_ID"}\n';
        }
        if ($tenant_source = "") {
            return 400 '{"error":"Invalid tenant ID","code":"INVALID_TENANT_ID","tenant_id":"$http_x_tenant_id"}\n';
        }

        content_by_lua_file /etc/nginx/lua/serve-hierarchy.lua;
    }

    location = /region {
        if ($request_method = OPTIONS) { return 204; }
        access_by_lua_file /etc/nginx/lua/origin-whitelist.lua;

        if ($http_x_tenant_id = "") {
            return 400 '{"error":"X-Tenant-ID header is required","code":"MISSING_TENANT_ID"}\n';
        }
        if ($tenant_source = "") {
            return 400 '{"error":"Invalid tenant ID","code":"INVALID_TENANT_ID","tenant_id":"$http_x_tenant_id"}\n';
        }

        content_by_lua_file /etc/nginx/lua/region-lookup.lua;
    }

    location = /boundaries/search {
        if ($request_method = OPTIONS) { return 204; }
        access_by_lua_file /etc/nginx/lua/origin-whitelist.lua;

        if ($http_x_tenant_id = "") {
            return 400 '{"error":"X-Tenant-ID header is required","code":"MISSING_TENANT_ID"}\n';
        }
        if ($tenant_source = "") {
            return 400 '{"error":"Invalid tenant ID","code":"INVALID_TENANT_ID","tenant_id":"$http_x_tenant_id"}\n';
        }

        content_by_lua_file /etc/nginx/lua/search-boundaries.lua;
    }

    # Admin zone management — all tenant auth via X-Tenant-ID header
    location ~ ^/admin/zones {
        if ($request_method = OPTIONS) { return 204; }
        access_by_lua_file /etc/nginx/lua/origin-whitelist.lua;

        if ($http_x_tenant_id = "") {
            return 400 '{"error":"X-Tenant-ID header is required","code":"MISSING_TENANT_ID"}\n';
        }
        if ($tenant_source = "") {
            return 400 '{"error":"Invalid tenant ID","code":"INVALID_TENANT_ID","tenant_id":"$http_x_tenant_id"}\n';
        }

        content_by_lua_file /etc/nginx/lua/admin-zones.lua;
    }

    # Admin territory management (add/remove LGAs from tenant scope)
    location ~ ^/admin/territories {
        if ($request_method = OPTIONS) { return 204; }
        access_by_lua_file /etc/nginx/lua/origin-whitelist.lua;

        if ($http_x_tenant_id = "") {
            return 400 '{"error":"X-Tenant-ID header is required","code":"MISSING_TENANT_ID"}\n';
        }

        content_by_lua_file /etc/nginx/lua/admin-territories.lua;
    }

    # Admin country states — for Add Tenant wizard (no X-Tenant-ID required)
    location ~ ^/admin/states {
        if ($request_method = OPTIONS) { return 204; }
        access_by_lua_file /etc/nginx/lua/origin-whitelist.lua;

        content_by_lua_file /etc/nginx/lua/admin-country-states.lua;
    }

    # Admin tenant management (list + create tenants)
    location ~ ^/admin/tenants {
        if ($request_method = OPTIONS) { return 204; }
        access_by_lua_file /etc/nginx/lua/origin-whitelist.lua;

        content_by_lua_file /etc/nginx/lua/admin-tenants.lua;
    }

    location ~ ^/tiles/(?<zoom>\d+)/(?<x>\d+)/(?<y>\d+)$ {
        access_by_lua_file /etc/nginx/lua/origin-whitelist.lua;

        if ($http_x_tenant_id = "") {
            return 400 '{"error":"X-Tenant-ID header is required","code":"MISSING_TENANT_ID"}\n';
        }
        if ($tenant_source = "") {
            return 400 '{"error":"Invalid tenant ID","code":"INVALID_TENANT_ID","tenant_id":"$http_x_tenant_id"}\n';
        }

        rewrite ^/tiles/(.*)$ /$tenant_source/$1 break;
        proxy_pass http://martin;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_pragma $http_authorization;
        add_header X-Tenant-Source $tenant_source always;
        add_header Cache-Control "public, max-age=3600" always;
        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
        proxy_intercept_errors on;
        error_page 404 = @tile_not_found;
        error_page 502 503 504 = @tile_upstream_error;
    }

    location ~ ^/boundaries/(?<zoom>\d+)/(?<x>\d+)/(?<y>\d+)$ {
        access_by_lua_file /etc/nginx/lua/origin-whitelist.lua;

        if ($http_x_tenant_id = "") {
            return 400 '{"error":"X-Tenant-ID header is required","code":"MISSING_TENANT_ID"}\n';
        }
        if ($tenant_source = "") {
            return 400 '{"error":"Invalid tenant ID","code":"INVALID_TENANT_ID","tenant_id":"$http_x_tenant_id"}\n';
        }
        if ($boundary_source = "") {
            return 404 '{"error":"No boundary data for this tenant","code":"NO_BOUNDARY_DATA","tenant_id":"$http_x_tenant_id"}\n';
        }

        rewrite ^/boundaries/(.*)$ /$boundary_source/$1 break;
        proxy_pass http://martin;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_pragma $http_authorization;
        add_header X-Tenant-Source $tenant_source always;
        add_header X-Boundary-Source $boundary_source always;
        add_header Cache-Control "public, max-age=7200" always;
        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
        proxy_intercept_errors on;
        error_page 404 = @boundary_not_found;
        error_page 502 503 504 = @boundary_upstream_error;
    }

    location @tile_not_found {
        add_header Content-Type application/json always;
        return 404 '{"error":"Tile not found","code":"TILE_NOT_FOUND","tenant_id":"$http_x_tenant_id","source":"$tenant_source"}\n';
    }

    location @boundary_not_found {
        add_header Content-Type application/json always;
        return 404 '{"error":"Boundary tile not found","code":"BOUNDARY_NOT_FOUND","tenant_id":"$http_x_tenant_id","source":"$boundary_source"}\n';
    }

    location @tile_upstream_error {
        add_header Content-Type application/json always;
        return 502 '{"error":"Tile server unavailable","code":"UPSTREAM_ERROR"}\n';
    }

    location @boundary_upstream_error {
        add_header Content-Type application/json always;
        return 502 '{"error":"Boundary server unavailable","code":"UPSTREAM_ERROR"}\n';
    }

    location / {
        add_header Content-Type application/json always;
        return 404 '{"error":"Not found","code":"INVALID_ENDPOINT"}\n';
    }
}
